{% extends 'base.html' %}

{% block content %}
<div class="col-lg-8 mx-auto">
    <div class="card p-4 border-warning shadow-sm">
        <div class="d-flex justify-content-between mb-4">
            <h2>{% if note %}Edit Note{% else %}New Smart Note{% endif %}</h2>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>

        <form method="post" id="noteForm">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Note Title</label>
                <input type="text" name="title" class="form-control form-control-lg bg-warning bg-opacity-10"
                    value="{{ note.title }}" placeholder="e.g. Grocery List" required>
            </div>

            <div id="itemsContainer" class="mb-4">
                {% if note %}
                {% for item in note.items.all %}
                <div class="input-group mb-2 item-row">
                    <input type="text" name="item_name[]" class="form-control" value="{{ item.item_name }}" required>
                    <span class="input-group-text">$</span>
                    <input type="number" name="price[]" class="form-control price" value="{{ item.price }}" required
                        step="0.01">
                    <button type="button" class="btn btn-outline-danger remove-row">×</button>
                </div>
                {% endfor %}
                {% else %}
                <div class="input-group mb-2 item-row">
                    <input type="text" name="item_name[]" class="form-control" placeholder="Item name" required>
                    <span class="input-group-text">$</span>
                    <input type="number" name="price[]" class="form-control price" placeholder="0.00" required
                        step="0.01">
                    <button type="button" class="btn btn-outline-danger remove-row">×</button>
                </div>
                {% endif %}
            </div>

            <button type="button" class="btn btn-outline-warning text-dark mb-4" id="addItem">+ Add Item</button>

            <div class="d-flex justify-content-between align-items-center border-t pt-3">
                <h4 class="mb-0">Estimated Total: $<span id="noteTotal">0.00</span></h4>
                <button type="submit" class="btn btn-warning text-dark px-5 fw-bold">Save Note</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('itemsContainer');
        const totalSpan = document.getElementById('noteTotal');

        const calculateTotal = () => {
            let total = 0;
            document.querySelectorAll('.price').forEach(input => {
                total += parseFloat(input.value) || 0;
            });
            totalSpan.textContent = total.toFixed(2);
        };

        container.addEventListener('input', (e) => {
            if (e.target.matches('.price')) calculateTotal();
        });

        document.getElementById('addItem').addEventListener('click', () => {
            const div = document.createElement('div');
            div.className = 'input-group mb-2 item-row';
            div.innerHTML = `
                <input type="text" name="item_name[]" class="form-control" placeholder="Item name" required>
                <span class="input-group-text">$</span>
                <input type="number" name="price[]" class="form-control price" placeholder="0.00" required step="0.01">
                <button type="button" class="btn btn-outline-danger remove-row">×</button>
            `;
            container.appendChild(div);
        });

        container.addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-row')) {
                if (container.children.length > 1) {
                    e.target.closest('.item-row').remove();
                    calculateTotal();
                }
            }
        });

        calculateTotal();
    });
</script>
{% endblock %}
