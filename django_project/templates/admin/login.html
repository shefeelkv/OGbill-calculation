<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | WISEWAX</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --ww-primary: #0f172a;
            /* Navy Slate */
            --ww-secondary: #0ea5e9;
            /* Sky Blue */
            --ww-accent: #f59e0b;
            /* Amber Gold */
            --ww-bg: #f8fafc;
        }

        body {
            background-color: var(--ww-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }

        .card-header {
            background-color: var(--ww-primary);
            color: white;
            padding: 2rem;
            text-align: center;
            border: none;
        }

        .btn-primary {
            background-color: var(--ww-primary);
            border: none;
            padding: 12px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #1e293b;
        }
    </style>
</head>

<body>

    <div class="login-card card">
        <div class="card-header">
            <h2 class="mb-0"><i class="fa-solid fa-feather-pointed me-2"></i>WISE<span>WAX</span></h2>
            <small class="opacity-75">Admin Portal</small>
        </div>
        <div class="card-body p-4">

            <div class="alert alert-warning border-warning d-flex align-items-center mb-4" role="alert">
                <i class="fas fa-triangle-exclamation me-2"></i>
                <div class="small fw-bold">
                    This login is for Admins only.
                </div>
            </div>

            <form action="{{ app_path }}" method="post" id="login-form">
                {% csrf_token %}

                {% if form.errors %}
                <div class="alert alert-danger small py-2">Invalid credentials.</div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="fas fa-user text-secondary"></i></span>
                        <input type="text" name="username" class="form-control border-start-0 ps-0" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="fas fa-lock text-secondary"></i></span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Login to Dashboard</button>

                <div class="text-center">
                    <a href="/" class="text-decoration-none small text-secondary">← Back to Site</a>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
