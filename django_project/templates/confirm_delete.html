{% extends 'base.html' %}

{% block content %}
<div class="col-md-6 mx-auto mt-5">
    <div class="card p-5 text-center border-danger">
        <h2 class="text-danger mb-3">Delete {{ type }}?</h2>
        <p class="lead mb-4">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be
            undone.</p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'dashboard' %}" class="btn btn-secondary px-4">Cancel</a>
                <button type="submit" class="btn btn-danger px-4">Confirm Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
