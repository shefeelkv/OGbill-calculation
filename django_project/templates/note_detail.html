{% extends 'base.html' %}

{% block content %}
<div class="col-lg-6 mx-auto">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">← Dashboard</a>
        <div class="d-flex gap-2">
            <a href="{% url 'edit_note' note.id %}" class="btn btn-warning">Edit</a>
            <a href="{% url 'delete_note' note.id %}" class="btn btn-danger">Delete</a>
        </div>
    </div>

    <div class="card shadow-sm border-warning" style="background-color: #fffbf0;">
        <div class="card-body p-5">
            <h1 class="h2 mb-4 fw-bold" style="font-family: 'Comic Sans MS', cursive, sans-serif;">{{ note.title }}</h1>
            <p class="text-muted small mb-4">Created: {{ note.created_at|date:"M d, Y h:i A" }}</p>

            <ul class="list-group list-group-flush bg-transparent">
                {% for item in note.items.all %}
                <li
                    class="list-group-item bg-transparent d-flex justify-content-between align-items-center border-warning border-opacity-25 border-dashed">
                    <span class="lead">{{ item.item_name }}</span>
                    <span class="fw-bold">${{ item.price }}</span>
                </li>
                {% endfor %}
            </ul>

            <div class="mt-4 pt-3 border-top border-warning border-2">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="h5 mb-0">Total Estimate</span>
                    <span class="h3 fw-bold mb-0">${{ note.total_amount }}</span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .border-dashed {
        border-bottom-style: dashed !important;
    }
</style>
{% endblock %}
